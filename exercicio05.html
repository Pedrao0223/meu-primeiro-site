<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audios</title>
</head>
<body>

    <h1>Trabalhando com audio e videos</h1>

    <h2>Adicionando audio simples</h2> 

    <audio src="QUERO SER O SEU AMOR.mp3" controls autoplay></audio> 

    <h2>novo forma de adicionar audio</h2> 

    <audio controls preload="none" loop>

        <source src="QUERO SER O SEU AMOR.mp3" type="audio/mp3">

    </audio> 

    <h2>Adicionando video forma simples</h2> 

    <video src="464477_Medical_Coronavirus_3840x2160.mp4" controls width="600" height="500"></video> 

    <h2>adicionando video de outro forma</h2>

    <video controls width="500">
        <source src="464477_Medical_Coronavirus_3840x2160.mp4" type="video/mp4"> 
        
    </video> 

        <video controls width="500" poster="shutterstock_557205925.webp">
        <source src="15540646_3840_2160_30fps.mp4" type="video/mp4"> 
        
    </video> 


    <h2>Adicionaod video pelo youtuibe</h2> 



    <iframe width="560" height="315" src="https://www.youtube.com/embed/zf4AVWAmjpU?si=5mcW-ZVl5EqeezOi" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
